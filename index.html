<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLSI M100 (2023) Big Data AST Navigator</title>
    <style>
        :root { --p: #0f172a; --r: #ef4444; --i: #f59e0b; --sdd: #f97316; --s: #22c55e; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; font-size: 13px; }
        .wrapper { max-width: 1500px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--p); color: white; padding: 20px; text-align: center; border-bottom: 4px solid #334155; }
        
        /* Interactive Dashboard */
        .dash { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .control { display: flex; flex-direction: column; }
        label { font-weight: bold; color: #475569; margin-bottom: 5px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
        select, input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
        .res-out { height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 800; font-size: 1.1rem; background: #cbd5e1; color: #1e293b; transition: all 0.3s ease; border: 2px solid transparent; }

        /* Massive Table Styling */
        .table-wrap { padding: 20px; overflow-x: auto; }
        #search { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f1f5f9; color: #334155; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; position: sticky; top: 0; font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: top; line-height: 1.4; }
        .drug-tag { font-family: monospace; font-weight: bold; color: #b91c1c; background: #fee2e2; padding: 2px 4px; border-radius: 3px; }
        .comment { font-size: 11.5px; color: #64748b; max-width: 400px; }
        
        .R { color: var(--r); font-weight: bold; }
        .I { color: var(--i); font-weight: bold; }
        .SDD { color: var(--sdd); font-weight: bold; }
        .S { color: var(--s); font-weight: bold; }
        .warn { display: inline-block; color: white; background: #dc2626; padding: 1px 4px; border-radius: 3px; font-size: 10px; font-weight: 800; margin-right: 5px; }
    </style>
</head>

    <div class="dash">

        </div>
        <div class="control">

        </div>
        <div class="control">

            <input type="number" id="mmBox" placeholder="Measured value..." oninput="runInterpret()">
        </div>
        <div class="control">
            <label>4. Automatic Interpretation</label>
            <div id="resPill" class="res-out">READY</div>
        </div>
    </div>

    <div class="table-wrap">
        <input type="text" id="search" placeholder="Search by drug name or LIS code (e.g., 'FEP')..." onkeyup="refreshUI()">

                    <th>R (≤)</th>

                    <th>Susceptible (≥)</th>

            </thead>

    </div>
</div>

function init() {
    const s = document.getElementById('sppBox');
    sppList.forEach((grpName, idx) => {
        let o = document.createElement('option');
        o.value = idx; 
        o.innerText = grpName;
        s.appendChild(o);
    });
    updateDrugList();
    refreshUI();
}

// Repopulates the dropdown based on the species group selected
function updateDrugList() {
    const curGrp = parseInt(document.getElementById('sppBox').value);
    const dBox = document.getElementById('drugBox');
    dBox.innerHTML = "";

    const drugsInGrp = bigData.filter(d => d.grp === curGrp);
    drugsInGrp.forEach(d => {
        const o = document.createElement('option');
        o.value = d.code; // Use code as value for easier lookup
        o.innerText = `${d.name} (${d.code})`;
        dBox.appendChild(o);
    });
}

// Updates the table below based on search and species
function refreshUI() {
    const curGrp = parseInt(document.getElementById('sppBox').value);
    const q = document.getElementById('search').value.toLowerCase();
    const tbody = document.getElementById('mainBody');
    
    tbody.innerHTML = "";

    const filtered = bigData.filter(d => 
        d.grp === curGrp && 
        (d.name.toLowerCase().includes(q) || d.code.toLowerCase().includes(q))
    );

    filtered.forEach(d => {
        const iV = d.i ? `${d.i[0]}-${d.i[1]}` : '-';
        const sddV = d.sdd ? `${d.sdd[0]}-${d.sdd[1]}` : '-';
        
        tbody.innerHTML += `
            <tr>
                <td><span class="drug-tag">${d.code}</span></td>
                <td><strong>${d.name}</strong></td>
                <td>${d.disk}</td>
                <td><span class="R">≤${d.r || '-'}</span></td>
                <td><span class="I">${iV}</span></td>
                <td><span class="SDD">${sddV}</span></td>
                <td><span class="S">≥${d.s || '-'}</span></td>
                <td class="comment">${d.comm}</td>
            </tr>`;
    });
}

function runInterpret() {
    const curGrp = parseInt(document.getElementById('sppBox').value);
    const mm = parseInt(document.getElementById('mmBox').value);
    const res = document.getElementById('resPill');
    const selectedDrugCode = document.getElementById('drugBox').value;
    
    if (isNaN(mm) || !selectedDrugCode) {
        res.innerText = "WAITING FOR INPUT"; 
        res.style.background = "#cbd5e1";
        res.style.color = "#1e293b";
        return;
    }

    const drug = bigData.find(d => d.grp === curGrp && d.code === selectedDrugCode);

    if (!drug) return;

    // Interpretation logic
    if (drug.disk === "See MIC" || drug.s === 0) {
        res.innerText = "USE MIC METHOD"; 
        res.style.background = "#1e293b"; 
        res.style.color = "white";
    } else if (mm >= drug.s) {
        res.innerText = "SUSCEPTIBLE (S)"; 
        res.style.background = "var(--s)";
        res.style.color = "black";
    } else if (drug.sdd && mm >= drug.sdd[0] && mm <= drug.sdd[1]) {
        res.innerText = "SUSC-DOSE DEP (SDD)"; 
        res.style.background = "var(--sdd)"; 
        res.style.color = "white";
    } else if (drug.i && mm >= drug.i[0] && mm <= drug.i[1]) {
        res.innerText = "INTERMEDIATE (I)"; 
        res.style.background = "var(--i)";
        res.style.color = "black";
    } else if (mm <= drug.r) {
        res.innerText = "RESISTANT (R)"; 
        res.style.background = "var(--r)"; 
        res.style.color = "white";
    } else {
        res.innerText = "INVALID ZONE";
        res.style.background = "#cbd5e1";
    }
}
