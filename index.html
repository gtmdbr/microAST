<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViTEK Editable Drug Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .table-row-hover:hover { background-color: #f9fafb; }
        
        /* Styling for editable cells */
        .editable-cell {
            padding: 0.5rem;
            border-radius: 0.375rem;
            border: 1px solid transparent;
            transition: all 0.2s;
            min-height: 24px;
            outline: none;
        }
        .editable-cell:hover {
            background-color: #eff6ff;
            border-color: #bfdbfe;
            cursor: text;
        }
        .editable-cell:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        .editable-cell:empty:before {
            content: "-";
            color: #d1d5db;
        }
    </style>
</head>
<body class="p-6 md:p-12 text-gray-800">

    <div class="max-w-7xl mx-auto">
        <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="text-left">
                <h1 class="text-3xl font-bold text-blue-700 mb-2"><i class="fa-solid fa-pen-to-square mr-2"></i> Editable ViTEK Directory</h1>
                <p class="text-gray-500">Changes are <span class="text-green-600 font-semibold"><i class="fa-solid fa-cloud-arrow-up"></i> auto-saved</span> to your browser.</p>
            </div>
            
            <div class="flex gap-3">
                <button onclick="resetData()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-medium py-2 px-4 rounded-lg transition-colors flex items-center gap-2 shadow-sm text-sm">
                    <i class="fa-solid fa-rotate-left"></i> Reset Data
                </button>
                <button onclick="addNewRow()" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex items-center gap-2 shadow-sm text-sm">
                    <i class="fa-solid fa-plus"></i> Add Row
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row gap-4 justify-between items-center border border-gray-100">
            
            <div class="relative w-full md:w-5/12">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                </div>
                <input type="text" id="searchInput" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 outline-none transition-all" placeholder="Search by Drug Code or Name...">
            </div>

            <div class="w-full md:w-3/12">
                <select id="groupSelect" class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none cursor-pointer">
                    <option value="all">All AST Groups</option>
                    <option value="AST 628">AST 628</option>
                    <option value="AST 406">AST 406</option>
                    <option value="AST 405">AST 405</option>
                    <option value="AST 235">AST 235</option>
                </select>
            </div>

            <div class="w-full md:w-auto flex justify-end">
                <button onclick="sortAlphabetically()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 px-5 rounded-lg transition-colors flex items-center gap-2 border border-gray-200 text-sm">
                    <i class="fa-solid fa-arrow-down-a-z"></i> Sort A-Z
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-600">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th scope="col" class="px-4 py-4 font-semibold w-2/12">Drug Code</th>
                            <th scope="col" class="px-4 py-4 font-semibold w-4/12">Drug Name</th>
                            <th scope="col" class="px-4 py-4 font-semibold text-center group-col w-1/12" data-group="AST 628">AST 628</th>
                            <th scope="col" class="px-4 py-4 font-semibold text-center group-col w-1/12" data-group="AST 406">AST 406</th>
                            <th scope="col" class="px-4 py-4 font-semibold text-center group-col w-1/12" data-group="AST 405">AST 405</th>
                            <th scope="col" class="px-4 py-4 font-semibold text-center group-col w-1/12" data-group="AST 235">AST 235</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
            <div id="noResults" class="hidden p-8 text-center text-gray-500">
                <i class="fa-regular fa-folder-open text-4xl mb-3 text-gray-300"></i>
                <p>No drugs found matching your search criteria.</p>
            </div>
        </div>
    </div>

    <script>
        // Key for local storage
        const STORAGE_KEY = 'vitekDrugData_v1';

        // Default Data parsed from new Excel file (Comments removed)
        const defaultDrugData = [
            {"code": "AK", "name": "Amikacin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "AMC", "name": "Amoxicillin/clavulanate", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "AMP", "name": "Ampicillin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "AT", "name": "Aztreonam", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "BP", "name": "Benzylpenicillin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CAZ", "name": "Ceftazidime", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CD", "name": "Clindamycin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CF", "name": "Cefalotin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CF/S", "name": "Cefoperazone/Sulbactam", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CFM", "name": "Cefixime", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CIP", "name": "Ciprofloxacin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CL", "name": "Colistin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "COT", "name": "Sulfamethoxazole/Trimethoprim", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CPM", "name": "Cefepime", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CTR", "name": "Ceftriaxone", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CX", "name": "Cefoxitin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "CXM", "name": "Cefuroxime Axetil", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "DPT", "name": "Daptomycin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "E", "name": "Erythromycin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "ETP", "name": "Ertapenem", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "ETR", "name": "Ertapenam", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "FO", "name": "Fosfomycin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "GEN ", "name": "Gentamicin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "IPM", "name": "Imipenem", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "LE", "name": "Levofloxacin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "LZ", "name": "Linezolid", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "MI", "name": "Minocycline", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "MRP", "name": "Meropenem", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "NA", "name": "Nalidixic acid", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "NIT", "name": "Nitrofurantoin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "NX", "name": "Norfloxacin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "OF", "name": "Ofloxacin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "OX ", "name": "Oxacillin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "P/T", "name": "Piperacillin/Tazobactam", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "RIF", "name": "Rifampicin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "TE", "name": "Tetracycline", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "TEI", "name": "Teicoplanin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "TGC", "name": "Tigecycline", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "TI", "name": "Ticarcillin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}, 
            {"code": "V", "name": "Vancomycin", "AST 628": "", "AST 406": "", "AST 405": "", "AST 235": ""}
        ];

        let drugData = [];
        let currentId = 0;

        // Load data from LocalStorage or use Default
        try {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                drugData = JSON.parse(savedData);
                // Set currentId based on highest existing ID to avoid conflicts when adding rows
                if (drugData.length > 0) {
                    currentId = Math.max(...drugData.map(d => d.id || 0)) + 1;
                }
            } else {
                // Clone default data and assign IDs
                drugData = JSON.parse(JSON.stringify(defaultDrugData));
                drugData.forEach(item => item.id = currentId++);
                saveToLocalStorage();
            }
        } catch (error) {
            console.error("Failed to load local data, restoring default.", error);
            drugData = JSON.parse(JSON.stringify(defaultDrugData));
            drugData.forEach(item => item.id = currentId++);
        }

        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const groupSelect = document.getElementById('groupSelect');
        const noResults = document.getElementById('noResults');

        // Function to save current state to LocalStorage
        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(drugData));
        }

        // Reset Data Function
        function resetData() {
            if (confirm("Are you sure you want to reset the directory? All your edited changes and custom rows will be permanently deleted.")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload(); // Reload page to fetch defaults again
            }
        }
        
        // Render Table Function
        function renderTable(data, groupFilter) {
            tableBody.innerHTML = '';
            
            // Handle Columns Visibility based on Group
            const allGroupCols = document.querySelectorAll('.group-col');
            allGroupCols.forEach(col => {
                if(groupFilter === 'all' || col.dataset.group === groupFilter) {
                    col.classList.remove('hidden');
                } else {
                    col.classList.add('hidden');
                }
            });

            if (data.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                
                data.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.className = `border-b border-gray-100 table-row-hover ${index % 2 === 0 ? 'bg-white' : 'bg-gray-50/50'}`;
                    
                    let rowHTML = `
                        <td class="px-2 py-2">
                            <div contenteditable="true" class="editable-cell font-medium text-blue-700 uppercase" data-id="${item.id}" data-field="code">${item.code}</div>
                        </td>
                        <td class="px-2 py-2">
                            <div contenteditable="true" class="editable-cell text-gray-800 font-medium" data-id="${item.id}" data-field="name">${item.name}</div>
                        </td>
                    `;

                    // Generate AST Columns dynamically
                    ['AST 628', 'AST 406', 'AST 405', 'AST 235'].forEach(ast => {
                        if (groupFilter === 'all' || groupFilter === ast) {
                            rowHTML += `
                            <td class="px-2 py-2 text-center group-col">
                                <div contenteditable="true" class="editable-cell text-green-700 font-bold" data-id="${item.id}" data-field="${ast}">${item[ast] || ""}</div>
                            </td>`;
                        }
                    });

                    tr.innerHTML = rowHTML;
                    tableBody.appendChild(tr);
                });
            }
        }

        // Search and Filter Logic
        function handleFilter() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedGroup = groupSelect.value;

            const filteredData = drugData.filter(item => {
                return item.code.toLowerCase().includes(searchTerm) || 
                       item.name.toLowerCase().includes(searchTerm);
            });

            renderTable(filteredData, selectedGroup);
        }

        // Sort Functionality
        function sortAlphabetically() {
            drugData.sort((a, b) => {
                const nameA = a.name.toLowerCase();
                const nameB = b.name.toLowerCase();
                if (nameA < nameB) return -1;
                if (nameA > nameB) return 1;
                return 0;
            });
            saveToLocalStorage(); // Save new sorted order
            handleFilter(); // Re-render table keeping current search/filters active
        }

        // Add Row Functionality
        function addNewRow() {
            const newRow = {
                "id": currentId++,
                "code": "",
                "name": "",
                "AST 628": "",
                "AST 406": "",
                "AST 405": "",
                "AST 235": ""
            };
            drugData.push(newRow);
            
            saveToLocalStorage(); // Save after adding a row
            
            // Clear search to ensure the new row is visible at the bottom
            searchInput.value = "";
            handleFilter();
            
            // Auto-scroll to bottom of the window
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // Listener for Real-Time Data Updating via ContentEditable
        tableBody.addEventListener('input', (e) => {
            if (e.target.classList.contains('editable-cell')) {
                const id = e.target.getAttribute('data-id');
                const field = e.target.getAttribute('data-field');
                let newValue = e.target.innerText.trim();
                
                // If it's a code field, auto uppercase it in background data
                if (field === "code") {
                    newValue = newValue.toUpperCase();
                }

                // Update the main drugData array
                const dataIndex = drugData.findIndex(d => d.id == id);
                if (dataIndex !== -1) {
                    drugData[dataIndex][field] = newValue;
                    saveToLocalStorage(); // Auto-save on every keystroke
                }
            }
        });

        // Event Listeners for Filters
        searchInput.addEventListener('input', handleFilter);
        groupSelect.addEventListener('change', handleFilter);

        // Initial Render
        renderTable(drugData, 'all');
    </script>
</body>

</html>
